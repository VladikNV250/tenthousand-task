name: Continuous Integration

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm install

            - name: Lint & Typecheck
              run: |
                  npm run lint --if-present --workspaces
                  npm run typecheck --if-present --workspaces

            - name: Build
              run: npm run build --if-present --workspaces
