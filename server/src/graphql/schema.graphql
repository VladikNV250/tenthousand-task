type Form {
    id: ID!
    title: String!
    description: String
    questions: [Question!]!
}

type Question {
    id: ID!
    text: String!
    type: QuestionType!
    options: [String!]
    required: Boolean!
}

enum QuestionType {
    TEXT
    MULTIPLE_CHOICE
    CHECKBOXES
    DATE
}

type Answer {
    id: ID!
    questionId: ID!
    value: [String!]!
}

type Response {
    id: ID!
    formId: ID!
    answers: [Answer!]!
}

type Query {
    forms: [Form!]!
    form(id: ID!): Form
    responses(formId: ID!): [Response!]!
}

type Mutation {
    createForm(title: String!, description: String, questions: [QuestionInput!]): Form
    submitResponse(formId: ID!, answers: [AnswerInput!]): Response
}

input QuestionInput {
    id: ID!
    text: String!
    type: QuestionType!
    options: [String!]
    required: Boolean!
}

input AnswerInput {
    questionId: ID!
    value: [String!]!
}
